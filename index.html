<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundo Torajo - Versus Live</title>
    <style>
        :root {
            --cor-esquerda: #2ecc71; 
            --cor-direita: #e622cc;  
        }

        body {
            background-color: #fff;
            background-image: url('image_744b92.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Arial Black', Gadget, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        .container {
            width: 95%;
            max-width: 900px;
            text-align: center;
            margin-bottom: 50px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .nomes-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 8px;
        }

        .nome-personagem {
            color: #ffffff;
            text-transform: uppercase;
            -webkit-text-stroke: 1.5px #000;
            text-stroke: 1.5px #000;
            font-size: 2rem;
            width: 48%;
            display: inline-block;
            text-shadow: 3px 3px 0px rgba(0,0,0,0.8);
            transition: transform 0.2s ease;
            backface-visibility: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BARRA COM BRILHO E PROFUNDIDADE --- */
        .barra-container {
            width: 100%; 
            height: 35px;
            background-color: var(--cor-direita);
            border: 4px solid #000;
            border-radius: 50px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.5), inset 0 2px 8px rgba(0,0,0,0.6);
            transition: transform 0.1s ease, box-shadow 0.3s ease;
        }

        .barra-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 45%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.05) 100%);
            z-index: 10;
            pointer-events: none;
        }

        .progresso-esquerda {
            height: 100%;
            width: 50%; 
            background-color: var(--cor-esquerda);
            transition: width 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            border-right: 4px solid #000;
            position: relative;
            z-index: 2;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .listras-esquerda, .listras-direita {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.2) 50%, rgba(255,255,255,0.2) 75%, transparent 75%, transparent 100%);
            background-size: 40px 40px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .modo-turbo {
            opacity: 1 !important;
            animation: moveStripes 0.3s linear infinite !important;
            filter: brightness(1.2) drop-shadow(0 0 5px white);
        }

        @keyframes moveStripes {
            from { background-position: 0 0; }
            to { background-position: 40px 0; }
        }

        @keyframes shakeLight {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(1px, 1px) rotate(0.1deg); }
            50% { transform: translate(-1px, 0px) rotate(-0.1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .tremer { 
            animation: shakeLight 0.3s infinite ease-in-out;
        }

        /* --- VIEWS STYLES --- */
        .views-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 15px;
        }

        .views {
            background: #1a1a1a;
            color: #fff;
            padding: 10px 20px;
            border-radius: 12px;
            border: 3px solid #333;
            font-size: 1.1rem;
            white-space: nowrap;
            position: relative;
            box-shadow: 0 4px 0px #000;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #txtEsquerda { border-color: var(--cor-esquerda); }
        #txtDireita { border-color: var(--cor-direita); }

        .views::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            right: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .views::after {
            content: '●';
            color: #ff0000;
            font-size: 0.8rem;
            animation: pulse-live 1.5s infinite;
        }

        @keyframes pulse-live {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 600px) {
            .container { margin-bottom: 30px; }
            .nome-personagem { font-size: 1.1rem; }
            .barra-container { height: 26px; border-width: 3px; width: 100%; }
            .views { font-size: 0.8rem; padding: 6px 12px; border-width: 2px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="nomes-container">
            <span id="nomeEsquerda" class="nome-personagem">PRINCIPAIS</span>
            <span id="nomeDireita" class="nome-personagem">SECUNDÁRIOS</span>
        </div>

        <div id="barraVersus" class="barra-container">
            <div id="listrasDir" class="listras-direita"></div>
            <div id="barraProgresso" class="progresso-esquerda">
                <div id="listrasEsq" class="listras-esquerda"></div>
            </div>
        </div>

        <div class="views-container">
            <div class="views-box" style="width:48%; display:flex; justify-content:center;">
                <span id="txtEsquerda" class="views">0 views</span>
            </div>
            <div class="views-box" style="width:48%; display:flex; justify-content:center;">
                <span id="txtDireita" class="views">0 views</span>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyDrmeYowWXA0MGapkS45g9eHC_zkMULJhY';
        const VIDEOS_ESQUERDA = ['0A7PCwW8gsM']; 
        const VIDEOS_DIREITA  = ['ZmQAGt6_yC8']; 
        let viewsEsquerda = 0; 
        let viewsDireita = 0;
        const todosIds = [...VIDEOS_ESQUERDA, ...VIDEOS_DIREITA].join(',');

        function atualizarPlacar() {
            const total = (viewsEsquerda + viewsDireita) || 1; 
            const porcentagemEsquerda = (viewsEsquerda / total) * 100;
            const barra = document.getElementById('barraVersus');
            const progresso = document.getElementById('barraProgresso');
            const listrasEsq = document.getElementById('listrasEsq');
            const listrasDir = document.getElementById('listrasDir');
            const nomeEsq = document.getElementById('nomeEsquerda');
            const nomeDir = document.getElementById('nomeDireita');

            listrasEsq.classList.remove('modo-turbo');
            listrasDir.classList.remove('modo-turbo');
            barra.classList.remove('tremer');
            nomeEsq.classList.remove('tremer');
            nomeDir.classList.remove('tremer');
            
            listrasEsq.style.opacity = "0";
            listrasDir.style.opacity = "0";

            if (porcentagemEsquerda > 65) {
                listrasEsq.classList.add('modo-turbo');
                barra.classList.add('tremer');
                nomeDir.classList.add('tremer');
            } else if (porcentagemEsquerda < 35) {
                listrasDir.classList.add('modo-turbo');
                barra.classList.add('tremer');
                nomeEsq.classList.add('tremer');
            }

            progresso.style.width = porcentagemEsquerda + "%";
            document.getElementById('txtEsquerda').innerText = viewsEsquerda.toLocaleString('pt-BR') + " views";
            document.getElementById('txtDireita').innerText = viewsDireita.toLocaleString('pt-BR') + " views";
        }

        async function buscarViews() {
            try {
                const res = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${todosIds}&key=${API_KEY}`);
                const data = await res.json();
                if (data.items) {
                    let somaEsq = 0; let somaDir = 0;
                    data.items.forEach(video => {
                        const views = parseInt(video.statistics.viewCount);
                        if (VIDEOS_ESQUERDA.includes(video.id)) somaEsq += views;
                        else if (VIDEOS_DIREITA.includes(video.id)) somaDir += views;
                    });
                    viewsEsquerda = somaEsq; viewsDireita = somaDir;
                    atualizarPlacar();
                }
            } catch (e) { 
                if(viewsEsquerda === 0) { viewsEsquerda = 500000; viewsDireita = 500000; atualizarPlacar(); }
            }
        }

        document.addEventListener('keydown', (e) => {
            const inc = 10000;
            const key = e.key.toLowerCase();
            if (key === 's') viewsEsquerda += inc;
            if (key === 'p') viewsDireita += inc;
            if (key === 'r') { viewsEsquerda = 0; viewsDireita = 0; }
            atualizarPlacar();
        });

        buscarViews();
        setInterval(buscarViews, 300000); 
    </script>
</body>
</html>
